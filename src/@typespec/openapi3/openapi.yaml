components:
  schemas:
    AuthorizationCodeGrantParams:
      type: object
      required:
        - grant_type
        - code
        - redirect_uri
      properties:
        grant_type:
          type: string
          enum:
            - authorization_code
          description: OAuth grant type
        code:
          type: string
          description: Authorization code received from authorization server
        redirect_uri:
          type: string
          description: Redirect URI used in the authorization request
      description: Parameters for authorization code grant
    BankTransaction:
      type: object
      required:
        - id
        - groupOwnerId
        - movementName
        - date
        - value
        - kind
        - labelIds
      properties:
        id:
          $ref: '#/components/schemas/UUIDString'
        groupOwnerId:
          $ref: '#/components/schemas/UUIDString'
        movementName:
          type: string
        date:
          $ref: '#/components/schemas/DateOnly'
        dateValue:
          $ref: '#/components/schemas/DateOnly'
        details:
          type: string
        value:
          type: number
          format: decimal
        kind:
          type: string
        comment:
          type: string
        labelIds:
          type: array
          items:
            $ref: '#/components/schemas/UUIDString'
    BaseModifyUserData:
      type: object
      required:
        - username
        - email
        - isActive
        - isAdmin
      properties:
        username:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        isActive:
          type: boolean
        isAdmin:
          type: boolean
    BaseUserData:
      type: object
      required:
        - username
        - email
      properties:
        username:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
    CheckMyProfile:
      type: object
      oneOf:
        - $ref: '#/components/schemas/GetMyProfile'
        - $ref: '#/components/schemas/NotIdentified'
      discriminator:
        propertyName: user
        mapping:
          identified: '#/components/schemas/GetMyProfile'
          anonymous: '#/components/schemas/NotIdentified'
    ClientCredentialsGrantParams:
      type: object
      required:
        - grant_type
      properties:
        grant_type:
          type: string
          enum:
            - client_credentials
          description: OAuth grant type
      description: Parameters for client credentials grant
    Condition:
      oneOf:
        - $ref: '#/components/schemas/ConditionDouble'
        - $ref: '#/components/schemas/ConditionString'
    ConditionDouble:
      type: object
      required:
        - id
        - operation
        - value
      properties:
        id:
          $ref: '#/components/schemas/UUIDString'
        operation:
          $ref: '#/components/schemas/OperationDouble'
        value:
          type: number
          format: double
    ConditionDoubleInput:
      type: object
      required:
        - operation
        - value
      properties:
        operation:
          $ref: '#/components/schemas/OperationDouble'
        value:
          type: number
          format: double
    ConditionInput:
      oneOf:
        - $ref: '#/components/schemas/ConditionDoubleInput'
        - $ref: '#/components/schemas/ConditionStringInput'
    ConditionString:
      type: object
      required:
        - id
