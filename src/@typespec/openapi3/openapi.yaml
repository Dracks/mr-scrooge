openapi: 3.0.0
info:
  title: Mr Scrooge API
  version: 0.0.0
tags:
  - name: session
  - name: user
  - name: bank-transactions
  - name: labels
  - name: graphs
  - name: imports
  - name: rule
  - name: oauth
paths:
  /bank-transactions:
    get:
      operationId: ApiBankTransactions_list
      parameters:
        - name: groupIds
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/UUIDString'
          explode: false
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: uint16
            default: 100
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - results
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/BankTransaction'
                  next:
                    type: string
      tags:
        - bank-transactions
  /bank-transactions/{transactionId}:
    patch:
      operationId: ApiBankTransactions_comment
      description: Set a comment into the transaction
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDString'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankTransaction'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundBankTransaction'
      tags:
        - bank-transactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
  /bank-transactions/{transactionId}/label/{labelId}:
    post:
      operationId: ApiBankTransactions_linkLabel
      description: Link a label to a transaction
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDString'
        - name: labelId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDString'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankTransaction'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/NotFoundLabel'
                  - $ref: '#/components/schemas/NotFoundBankTransaction'
        '409':
          description: The request conflicts with the current state of the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - bank-transactions
    delete:
      operationId: ApiBankTransactions_unlinkLabel
      description: Remove a label from a transaction
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDString'
        - name: labelId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDString'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankTransaction'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Error'
                  - $ref: '#/components/schemas/NotFoundBankTransaction'
      tags:
        - bank-transactions
  /graphs:
    post:
      operationId: ApiGraphs_create
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Graph'
        '403':
          description: Forbidden, usually when using a group that the user doesn't have access to
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidGroupOwnerId'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundLabels'
      tags:
        - graphs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphInput'
    get:
      operationId: ApiGraphs_list
      parameters:
        - name: graphIds
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/UUIDString'
          explode: false
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: uint16
            default: 100
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - results
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Graph'
                  next:
                    type: string
      tags:
        - graphs
  /graphs/{id}:
    put:
      operationId: ApiGraphs_update
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDString'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Graph'
        '403':
          description: Forbidden, usually when using a group that the user doesn't have access to
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidGroupOwnerId'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/NotFoundLabels'
                  - $ref: '#/components/schemas/Error'
      tags:
        - graphs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphInput'
    delete:
      operationId: ApiGraphs_delete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDString'
      responses:
        '200':
          description: The request has succeeded.
          content:
            text/plain:
              schema:
                type: boolean
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - graphs
  /graphs/{id}/move:
    put:
      operationId: ApiGraphs_move
      description: Move up or down a graph inside the list of graphs for the same user group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDString'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - results
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Graph'
        '400':
          description: Bad request, usually when providing an invalid string as UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - graphs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                direction:
                  $ref: '#/components/schemas/MoveDirection'
              required:
                - direction
  /groups:
    post:
      operationId: ApiGroup_create
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserGroup'
      tags:
        - user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserGroupInput'
    get:
      operationId: ApiGroup_list
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int16
          explode: false
        - name: orphaned
          in: query
          required: false
          schema:
            type: boolean
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - results
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserGroup'
                  next:
                    type: string
      tags:
        - user
  /groups/{id}:
    put:
      operationId: ApiGroup_updateGroup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDString'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserGroup'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserGroupInput'
    delete:
      operationId: ApiGroup_delete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDString'
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - user
  /imports:
    get:
      operationId: ApiImports_list
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int16
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - results
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/FileImport'
                  next:
                    type: string
      tags:
        - imports
  /imports/parsers:
    get:
      operationId: ApiImports_parserTypes
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFileParsers'
      tags:
        - imports
  /imports/{id}:
    delete:
      operationId: ApiImports_delete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDString'
      responses:
        '200':
          description: The request has succeeded.
          content:
            text/plain:
              schema:
                type: boolean
      tags:
        - imports
  /imports/{id}/apply/{rowId}:
    post:
      operationId: ApiImports_applyRow
      description: This will allow to create a transaction from the file-import rowId
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDString'
        - name: rowId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDString'
      responses:
        '200':
          description: The request has succeeded.
          content:
            text/plain:
              schema:
                type: boolean
      tags:
        - imports
  /imports/{id}/rollback/{rowId}:
    delete:
      operationId: ApiImports_rollbackImport
      description: This will allow to delete a transaction using the file-import rowId
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDString'
        - name: rowId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDString'
      responses:
        '200':
          description: The request has succeeded.
          content:
            text/plain:
              schema:
                type: boolean
      tags:
        - imports
  /labels:
    get:
      operationId: ApiLabels_list
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: uint16
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - results
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Label'
                  next:
                    type: string
      tags:
        - labels
    post:
      operationId: ApiLabels_create
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Label'
        '400':
          description: Bad request, usually when providing an invalid string as UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden, usually when using a group that the user doesn't have access to
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidGroupOwnerId'
      tags:
        - labels
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLabel'
  /labels/{labelId}:
    put:
      operationId: ApiLabels_update
      parameters:
        - name: labelId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDString'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Label'
        '400':
          description: Bad request, usually when providing an invalid string as UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - labels
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLabel'
    delete:
      operationId: ApiLabels_delete
      parameters:
        - name: labelId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDString'
        - name: force
          in: query
          required: false
          description: When true, forcefully deletes the label and removes it from all relations. Use with caution as this will modify dependent entities.
          schema:
            type: boolean
            default: false
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            text/plain:
              schema:
                type: boolean
        '400':
          description: Bad request, usually when providing an invalid string as UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: The request conflicts with the current state of the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelInUse'
      tags:
        - labels
  /oauth/authorize:
    get:
      operationId: ApiOAuth_authorize
      description: Initiate OAuth authorization flow
      parameters:
        - name: request
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/OAuthAuthorizeRequest'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  authorization_code:
                    type: string
                  state:
                    type: string
                required:
                  - authorization_code
        '400':
          description: Bad request, usually when providing an invalid string as UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - oauth
  /oauth/clients:
    post:
      operationId: ApiOAuth_registerClient
      description: Register a new OAuth client
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClientWithSecret'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - oauth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                redirect_uris:
                  type: array
                  items:
                    type: string
                scopes:
                  type: array
                  items:
                    $ref: '#/components/schemas/OAuthScope'
              required:
                - name
                - redirect_uris
                - scopes
    get:
      operationId: ApiOAuth_listClients
      description: List OAuth clients
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: uint16
            default: 100
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - results
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/OAuthClient'
                  next:
                    type: string
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - oauth
  /oauth/clients/{clientId}:
    get:
      operationId: ApiOAuth_getClient
      description: Get OAuth client details
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDString'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClient'
        '400':
          description: Bad request, usually when providing an invalid string as UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - oauth
    delete:
      operationId: ApiOAuth_deleteClient
      description: Delete an OAuth client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDString'
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '400':
          description: Bad request, usually when providing an invalid string as UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - oauth
    patch:
      operationId: ApiOAuth_updateClient
      description: Update an OAuth client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDString'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClient'
        '400':
          description: Bad request, usually when providing an invalid string as UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - oauth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthClientUpdate'
  /oauth/token:
    post:
      operationId: ApiOAuth_token
      description: Exchange authorization code for access token or refresh access token
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthTokenResponse'
        '400':
          description: Bad request, usually when providing an invalid string as UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - oauth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthTokenRequest'
      security:
        - BasicAuth: []
  /rules:
    get:
      operationId: ApiRule_list
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int16
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - results
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Rule'
                  next:
                    type: string
      tags:
        - rule
    post:
      operationId: ApiRule_create
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
        '400':
          description: Bad request, usually when providing an invalid string as UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden, usually when using a group that the user doesn't have access to
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidGroupOwnerId'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleInput'
  /rules/{ruleId}:
    put:
      operationId: ApiRule_update
      parameters:
        - name: ruleId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDString'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
